---
kind: pipeline
type: exec
name: agentcafe-macos-alpha-release

node:
  runner_name: mac-arm-build

platform:
  os: darwin
  arch: arm64

trigger:
  event:
    - push
    - tag
  ref:
    - refs/heads/main
    - refs/tags/v*

steps:
  - name: prepare-release-metadata
    commands:
      - bash scripts/ci/version.sh

  - name: verify-minio-config
    depends_on:
      - prepare-release-metadata
    commands:
      - mkdir -p ~/.mc
      - cp /Users/duke/.mc/config.json ~/.mc/config.json
      - mc ls feinian/devops

  - name: test-and-package-macos
    depends_on:
      - verify-minio-config
    commands:
      - . .drone/version.env
      - cargo test
      - swift build --package-path apps/macos
      - node tests/integration/validate-diagnostic-fixtures.mjs
      - node tests/integration/validate-mvp2-fixtures.mjs
      - node tests/integration/validate-native-ui-contracts.mjs
      - git diff --check
      - if command -v jq >/dev/null 2>&1; then find . -path ./.git -prune -o -name '*.json' -print | sort | xargs -n1 jq empty; else echo 'SKIP: jq not found; JSON syntax validation skipped.'; fi
      - scripts/package-alpha.sh "$$VERSION"
      - rm -rf artifacts/release/macos
      - mkdir -p artifacts/release/macos
      - cp "dist/alpha/$$VERSION/AgentCafe-macos-$$VERSION.zip" artifacts/release/macos/
      - cp "dist/alpha/$$VERSION/AgentCafe-macos-$$VERSION.zip.sha256" artifacts/release/macos/

  - name: upload-macos-artifacts-to-minio
    depends_on:
      - test-and-package-macos
    commands:
      - . .drone/version.env
      - bash scripts/ci/minio-upload.sh artifacts/release/macos macos

---
kind: pipeline
type: exec
name: agentcafe-windows-alpha-release

node:
  runner_name: win-build

platform:
  os: windows
  arch: amd64

trigger:
  event:
    - push
    - tag
  ref:
    - refs/heads/main
    - refs/tags/v*

steps:
  - name: prepare-release-metadata
    commands:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-version.ps1

  - name: verify-minio-config
    depends_on:
      - prepare-release-metadata
    commands:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-minio-upload.ps1 -Action verify-minio

  - name: test-and-package-windows
    depends_on:
      - verify-minio-config
    commands:
      - cargo test
      - dotnet build apps/windows-wpf/AgentCafe.Windows.csproj
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command node -ErrorAction SilentlyContinue) { node tests/integration/validate-native-ui-contracts.mjs } else { Write-Host 'SKIP: node not found; native UI contract validation skipped on Windows runner.' }"
      - git diff --check
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command jq -ErrorAction SilentlyContinue) { Get-ChildItem -Recurse -File -Filter *.json | Where-Object { $$_.FullName -notmatch '\\.git[\\/]' } | ForEach-Object { jq empty $$_.FullName; if ($$LASTEXITCODE -ne 0) { exit $$LASTEXITCODE } } } else { Write-Host 'SKIP: jq not found; JSON syntax validation skipped.' }"
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-alpha-release.ps1

  - name: upload-windows-artifacts-to-minio
    depends_on:
      - test-and-package-windows
    commands:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-minio-upload.ps1 -Action upload -ArtifactKind windows
